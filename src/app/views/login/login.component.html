<div class="login-main-container">
    @for (line of appTitleLines; track $index) {
        <div [style.textShadow]="'0 0 8px var(--fg-color)'" [style.--delay]="line.delay">{{ line.text }}</div>
    }

    <button standard-btn type="button" class="login-button" (click)="openLoginDialog()">
        Authenticate
    </button>
</div>

<div class="toggle-theme-container">
    <app-theme-toggle></app-theme-toggle>
</div>
